version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: konicipi-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: konicipi-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/konicipidb
      - PORT=5000
    depends_on:
      - mongodb
    restart: always

  frontend:
    build: ./frontend
    container_name: konicipi-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: always

volumes:
  mongo-data:
